<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlimited Advanced Calculator </title>
    <link rel="stylesheet" href="cal.css">
    <style>
        
    </style>
</head>
<body>

    <div class="calculator">
        <div class="display-container">
            <div id="expression"></div>
            <div id="result"></div>
        </div>
        <div class="buttons-grid">
            <!-- Row 1 -->
            <button class="clear" onclick="clearAll()">C</button>
            <button class="clear" onclick="deleteLast()">⌫</button>
            <button class="function" onclick="appendOperator('**2')">x²</button>
            <button class="function" onclick="appendOperator('**')">xʸ</button>
            
            <!-- Row 2 -->
            <button class="function" onclick="applySqrt()">√</button>
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button class="operator" onclick="appendOperator('/')">÷</button>
            
            <!-- Row 3 -->
            <button onclick="appendNumber('9')">9</button>
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button class="operator" onclick="appendOperator('*')">×</button>
            
            <!-- Row 4 -->
            <button onclick="appendNumber('6')">6</button>
            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button class="operator" onclick="appendOperator('-')">-</button>
            
            <!-- Row 5 -->
            <button onclick="appendNumber('3')">3</button>
            <button onclick="appendNumber('0')">0</button>
            <button onclick="appendNumber('.')">.</button>
            <button class="operator" onclick="appendOperator('+')">+</button>

            <!-- Row 6 -->
            <button class="equal" onclick="calculate()">=</button>
        </div>
    </div>

    <script src="call.js"> </script>
</body>
</html>
